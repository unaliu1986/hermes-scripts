# DECO HITL 危险工具清单 v1.2
# ⚠️ whitelist 使用 fnmatch（glob 通配符），不是 regex。
# tools[].pattern 使用 regex。

whitelist:
  - glob: "rm -rf /tmp/*"
    regex: "^rm -rf /tmp/([^/.][^/]*)(/[^/.][^/]*)?$"
    cwd: "/tmp"
    reason: "临时文件清理（深度<=2，禁止路径穿越）"
  - glob: "rm -rf /tmp/"
    regex: "^rm -rf /tmp/([^/.][^/]*)(/[^/.][^/]*)?$"
    cwd: "/root"
    reason: "清理临时目录（深度<=2，禁止路径穿越）"
  - glob: "pkill -f cj_agnes*"
    cwd: "/root"
    reason: "CJ Agnes 管线进程管理"
  - glob: "pkill -f lix_image*"
    cwd: "/root"
    reason: "LIX 图片管线进程管理"
  - glob: "pkill -f gap_screening_v3*"
    cwd: "/root"
    reason: "GAP 筛选进程管理"

tools:
  - pattern: "pkill|killall|kill -9|kill --"
    description: "杀进程"
    level: CRITICAL
    confirm: "⚠️ 确认要杀进程？PID/名称: {matched}"
    require_reason: true

  - pattern: "rm -rf|rm -r"
    description: "递归删除目录"
    level: CRITICAL
    confirm: "⚠️ 确认要删除 {matched}？不可恢复"
    options:
      - "确认删除"
      - "取消"

  - pattern: "systemctl.*(restart|stop).*hermes"
    description: "重启/停止 Hermes 服务"
    level: HIGH
    confirm: "确认要操作 Hermes 网关服务？这会导致当前连接中断。"
    options:
      - "确认操作"
      - "取消"

  - pattern: "python3.*(submit|add_item|revise|AddItem|ReviseItem).*ebay"
    description: "eBay API 写入操作"
    level: CRITICAL
    confirm: "⚠️ 确认将数据提交到 eBay 生产环境？建议先 dry-run。"
    options:
      - "推生产"
      - "先 dry-run"
      - "取消"
    require_reason: true

  - pattern: "python3.*publish|python3.*deploy"
    description: "发布/部署操作"
    level: CRITICAL
    confirm: "⚠️ 确认发布到生产环境？"
    options:
      - "确认发布"
      - "改为测试"
      - "取消"

  - pattern: "DROP\\s+TABLE|DROP\\s+DATABASE|TRUNCATE\\s+TABLE"
    description: "数据库删除操作"
    level: CRITICAL
    confirm: "⚠️ 确认执行数据库删除操作？不可逆！"
    options:
      - "确认"
      - "取消"

  - pattern: "\\bmysql\\b|\\bpsql\\b|\\bsqlite3\\b"
    description: "数据库命令行工具"
    level: HIGH
    confirm: "确认要直接操作数据库？"
    options:
      - "确认"
      - "取消"

  - pattern: "git push.*(main|master)"
    description: "推送到主分支"
    level: HIGH
    confirm: "确认推送到主分支？建议先走 PR。"
    options:
      - "确认推送"
      - "改为 PR"
      - "取消"

  - pattern: "chmod\\s+777|chmod\\s+-R\\s+777"
    description: "开放全部权限"
    level: HIGH
    confirm: "确认要开放 777 权限？建议仅给必要权限。"
    require_reason: true

  - pattern: "hermes.*config.*set.*model"
    description: "切换 Hermes 模型"
    level: MEDIUM
    confirm: "确认切换模型？新会话才会生效。"
