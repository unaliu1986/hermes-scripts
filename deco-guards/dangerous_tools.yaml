# DECO HITL 危险工具清单 v1.1
# 模拟 DECO 的 beforeTool Hook — 不可逆操作必须有物理阻断
# 
# 匹配顺序（强制）：whitelist FIRST → patterns → 无匹配放行
# 
# 阻断级别:
#   CRITICAL — 必须人工确认，不可跳过
#   HIGH     — 高风险，需确认 + 输入理由
#   MEDIUM   — 警告后继续

# ═══ 匹配引擎（agent 实现） ═══
# 1. 对命令做 AST 解析：
#    a. 拆管道 | 为独立子命令
#    b. 展开 $(...) 和 `...` 命令替换
#    c. 展开 $VAR 环境变量
#    d. 递归检查每个叶子命令
# 2. 叶子命令先查 whitelist（精确 or 路径通配）→ 命中放行
# 3. 再查 tools[].pattern → 命中按 level 处理
# 4. 无匹配 → 放行

# ═══ 安全管道检测 ═══
# 如果命令包含管道 |，必须拆分子命令逐个匹配。
# 示例: echo "DROP TABLE" | mysql → 拆成 ["echo ...", "mysql"] → mysql 命中 DROP TABLE 规则 → 阻断

# ═══ 豁免（whitelist） ═══
# ⚠️ 先于所有规则匹配。仅用于精确无歧义的已知安全操作。
# 格式: {pattern, cwd, reason}
whitelist:
  - pattern: "rm -rf /tmp/*"
    cwd: "/tmp"
    reason: "临时文件清理"
  - pattern: "rm -rf /tmp/"
    cwd: "/root"
    reason: "清理临时目录"
  - pattern: "pkill -f cj_agnes"
    cwd: "/root"
    reason: "CJ Agnes 管线进程管理"
  - pattern: "pkill -f lix_image"
    cwd: "/root"
    reason: "LIX 图片管线进程管理"
  - pattern: "pkill -f gap_screening_v3"
    cwd: "/root"
    reason: "GAP 筛选进程管理"

# ═══ 危险工具规则 ═══
tools:
  - pattern: "pkill|killall|kill -9|kill --"
    description: "杀进程"
    level: CRITICAL
    confirm: "⚠️ 确认要杀进程？PID/名称: {matched}"
    require_reason: true
    # 注意: whitelist 中的 cj_agnes/lix_image/gap_screening 已豁免

  - pattern: "rm -rf|rm -r"
    description: "递归删除目录"
    level: CRITICAL
    confirm: "⚠️ 确认要删除 {matched}？不可恢复"
    options:
      - "确认删除"
      - "取消"
    # 注意: whitelist 中的 /tmp/* 已豁免

  - pattern: "systemctl.*(restart|stop).*hermes"
    description: "重启/停止 Hermes 服务"
    level: HIGH
    confirm: "确认要操作 Hermes 网关服务？这会导致当前连接中断。"
    options:
      - "确认操作"
      - "取消"

  - pattern: "python3.*(submit|add_item|revise|AddItem|ReviseItem).*ebay"
    description: "eBay API 写入操作"
    level: CRITICAL
    confirm: "⚠️ 确认将数据提交到 eBay 生产环境？建议先 dry-run。"
    options:
      - "推生产"
      - "先 dry-run"
      - "取消"
    require_reason: true

  - pattern: "python3.*publish|python3.*deploy"
    description: "发布/部署操作"
    level: CRITICAL
    confirm: "⚠️ 确认发布到生产环境？"
    options:
      - "确认发布"
      - "改为测试"
      - "取消"

  - pattern: "DROP\\s+TABLE|DROP\\s+DATABASE|TRUNCATE\\s+TABLE"
    description: "数据库删除操作"
    level: CRITICAL
    confirm: "⚠️ 确认执行数据库删除操作？不可逆！"
    options:
      - "确认"
      - "取消"
    pipe_detect: true

  - pattern: "\\bmysql\\b|\\bpsql\\b|\\bsqlite3\\b"
    description: "数据库命令行工具"
    level: HIGH
    confirm: "确认要直接操作数据库 {matched}？"
    options:
      - "确认"
      - "取消"
    # 子规则：配合父规则，mysql/psql 出现在管道中时按此处理

  - pattern: "git push.*(main|master)"
    description: "推送到主分支"
    level: HIGH
    confirm: "确认推送到主分支？建议先 push 到 feature 分支或走 PR。"
    options:
      - "确认推送"
      - "改为 PR"
      - "取消"

  - pattern: "chmod\\s+777|chmod\\s+-R\\s+777"
    description: "开放全部权限"
    level: HIGH
    confirm: "确认要开放 777 权限？建议仅给必要权限。"
    require_reason: true

  - pattern: "hermes.*config.*set.*model"
    description: "切换 Hermes 模型"
    level: MEDIUM
    confirm: "确认切换模型？新会话才会生效。"
